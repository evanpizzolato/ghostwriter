<!DOCTYPE html>
<html>

<head>
  <title>Presenter Notes</title>
  <style>
    :root {
      /* Light mode color palette */

      --bg-primary: rgba(255, 255, 255, 1);
      /* Main white background */
      --bg-secondary: #f8f9fa;
      /* Slightly off-white for contrast */
      --bg-tertiary: #e9ecef;
      /* Light gray for borders/dividers */

      /* Blue accent colors */
      --blue-primary: #0066F3;
      /* Main blue for buttons */
      --blue-hover: #0056b3;
      /* Darker blue for hover states */
      --blue-light: #e3f2fd;
      /* Very light blue for backgrounds */
      --blue-border: #90caf9;
      /* Medium blue for borders */

      /* Text colors */
      --text-primary: #212529;
      /* Dark gray for main text */
      --text-secondary: #6c757d;
      /* Medium gray for secondary text */
      --text-muted: #adb5bd;
      /* Light gray for muted text */

      /* Status colors */
      --success: #28a745;
      /* Green for success states */
      --warning: #ffc107;
      /* Orange for warnings */
      --error: #dc3545;
      /* Red for errors */
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: rgba(255, 255, 255, 0.95);
      /* Using rgba */
      color: var(--text-primary);
      height: 100vh;
      display: flex;
      flex-direction: column;
      border-radius: 10px;
      overflow: hidden;
    }

    .header {
      background-color: rgba(248, 249, 250, 1);
      /* Fully opaque */
      border-bottom: 1px solid var(--bg-tertiary);
      padding: 8px 16px;
      -webkit-app-region: drag;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header h1 {
      color: var(--text-primary);
      font-size: 16px;
      font-weight: 600;
      margin: 0;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .title {
      font-size: 14px;
      font-weight: 500;
      opacity: 0.9;
    }

    #save-status {
      font-size: 11px;
      color: var(--success);
      min-width: 60px;
      text-align: right;
    }

    .badge-container {
      display: flex;
      align-items: center;
    }

    .privacy-badge {
      background-color: #ddffe4;
      border: none;
      color: #157c2d;
      padding: 2px 4px;
      border-radius: 4px;
      font-size: 9px;
      font-weight: 600;
      display: inline-block;
      /* box-shadow: 0 2px 4px rgba(0, 102, 204, 0.2); */
    }

    /* ===== privacy toggle switch ===== */
    .privacy-switch {
      position: relative;
      display: inline-block;
      width: 36px;
      height: 16px;
      margin-left: 8px;
      -webkit-app-region: no-drag;
    }

    .privacy-switch input {
      opacity: 0;
      width: 0;
      height: 0
    }

    .privacy-switch .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: .3s;
      border-radius: 24px
    }

    .privacy-switch .slider:before {
      position: absolute;
      content: "";
      height: 10px;
      width: 16px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .3s;
      border-radius: 8px;
    }

    .privacy-switch input:checked+.slider {
      background-color: var(--success)
    }

    .privacy-switch input:checked+.slider:before {
      transform: translateX(14px)
    }

    /* Click-through mode styling */
    body.click-through {
      animation: click-through-pulse 2s infinite;
    }

    @keyframes click-through-pulse {

      0%,
      100% {
        border-color: var(--bg-tertiary);
        box-shadow: 0 0 10px rgba(255, 165, 0, 0.3);
      }

      50% {
        border-color: var(--bg-tertiary);
        box-shadow: 0 0 20px rgba(255, 165, 0, 0.5);
      }
    }

    /* 
    body.click-through .header {
      background-color: var(--bg-primary);
    }

    body.click-through #notes {
      background-color: var(--bg-primary);
      border-color: var(--bg-tertiary);
    } */

    body.click-through .click-through-badge {
      display: inline-block;
    }

    .click-through-badge {
      display: none;
      background-color: var(--warning);
      color: white;
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      margin-left: 8px;
      animation: pulse 2s infinite;
    }

    .content {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
      background-color: rgba(255, 255, 255, 0.95);
      /* Using rgba */
    }

    /* Text editing toolbar */
    .text-toolbar {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 8px;
      background-color: white;
      border-bottom: 1px solid var(--bg-tertiary);
      -webkit-app-region: no-drag;
    }

    .toolbar-btn {
      width: 28px;
      height: 28px;
      border: none;
      background-color: transparent;
      color: var(--text-primary);
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.05s;
    }

    .toolbar-btn:hover {
      background-color: var(--bg-secondary);
      border-color: var(--blue-primary);
    }

    .toolbar-btn.active {
      background-color: var(--blue-primary);
      color: white;
      border-color: var(--blue-primary);
    }

    .toolbar-separator {
      color: var(--text-muted);
      margin: 0 4px;
      font-size: 14px;
    }

    /* Font size dropdown */
    .font-size-dropdown {
      position: relative;
    }

    .font-size-dropdown label {
      font-size: 13px;
      padding-right: 8px;
    }

    #font-size-select {
      height: 28px;
      padding: 4px 24px 4px 8px;
      border: 1px solid var(--bg-tertiary);
      border-radius: 4px;
      background-color: transparent;
      color: var(--text-primary);
      font-size: 12px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      cursor: pointer;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6,9 12,15 18,9'%3e%3c/polyline%3e%3c/svg%3e");
      background-repeat: no-repeat;
      background-position: right 6px center;
      background-size: 12px;
      min-width: 50px;
    }

    #font-size-select:hover {
      border-color: var(--blue-primary);
      background-color: var(--bg-secondary);
    }

    #font-size-select:focus {
      border-color: var(--blue-primary);
      box-shadow: 0 0 0 2px rgba(0, 102, 204, 0.2);
    }

    #notes-wrapper {
      width: 100%;
      height: 100%;
      position: relative;
      background-color: var(--bg-primary);
      transition: background-color 0.2s ease;
    }

    #notes {
      flex: 1;
      background-color: transparent;
      color: var(--text-primary);
      border: none;
      padding: 12px 24px;
      font-size: 14px;
      line-height: 1.5;
      width: 100%;
      height: 100%;
      box-sizing: border-box;
      outline: none;
      transition: font-weight 0.2s ease, text-shadow 0.2s ease;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow-y: auto;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    #notes:empty:before {
      content: attr(data-placeholder);
      color: var(--text-secondary);
      pointer-events: none;
      white-space: pre-wrap;
    }


    #notes::placeholder {
      color: var(--text-secondary);
    }

    /* Controls bar */
    .controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 15px;
      padding: 10px 15px;
      background-color: rgba(255, 255, 255, 1);
      /* Fully opaque */
      border-top: 1px solid var(--bg-tertiary);
      -webkit-app-region: no-drag;
    }

    .control-group {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .control-label {
      font-size: 11px;
      color: var(--text-secondary);
      min-width: 50px;
    }

    /* Opacity slider */
    .slider {
      -webkit-appearance: none;
      width: 100%;
      height: 4px;
      background: var(--bg-tertiary);
      border-radius: 2px
    }

    .slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 14px;
      background: white;
      border-radius: 8px;
      border: 0.5px solid rgba(0, 0, 0, 0.02);
      cursor: pointer;
      box-shadow: 0 0 6px 0 rgba(0, 0, 0, 0.02), 0 2px 4px 0 rgba(0, 0, 0, 0.08);
      transition: transform 0.2s ease;
    }

    .slider::-webkit-slider-thumb:hover {
      transform: scale(1.1);
    }

    /* Opacity slider with blue fill */
    .opacity-slider {
      -webkit-appearance: none;
      width: 100%;
      height: 4px;
      background: linear-gradient(to right, var(--blue-primary) 0%, var(--blue-primary) var(--slider-value, 100%), var(--bg-tertiary) var(--slider-value, 100%), var(--bg-tertiary) 100%);
      border-radius: 2px;
      outline: none;
    }

    .opacity-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 14px;
      background: #ffffff;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 0 0 6px 0 rgba(0, 0, 0, 0.02), 0 2px 4px 0 rgba(0, 0, 0, 0.08);
      transition: transform 0.2s ease;
    }

    .opacity-slider::-webkit-slider-thumb:hover {
      transform: scale(1.1);
    }

    #opacity-value {
      font-size: 11px;
      color: var(--text-secondary);
      min-width: 35px;
    }



    /* Custom scrollbar for textarea */
    #notes::-webkit-scrollbar {
      width: 8px;
    }

    #notes::-webkit-scrollbar-track {
      background: var(--bg-tertiary);
      border-radius: 4px;
    }

    #notes::-webkit-scrollbar-thumb {
      background: var(--bg-tertiary);
      border-radius: 4px;
    }

    #notes::-webkit-scrollbar-thumb:hover {
      background: var(--bg-tertiary);
    }
  </style>
</head>

<body>
  <div class="header">
    <div class="header-left">
      <!-- <div class="title">Presenter Notes</div> -->
    </div>
    <div class="badge-container">
      <span class="privacy-badge">PRIVACY MODE</span>
      <label class="privacy-switch">
        <input type="checkbox" id="privacy-checkbox" checked />
        <span class="slider round" style="height: 16px;"></span>
      </label>

      <span class="click-through-badge">CLICK-THROUGH</span>
    </div>
  </div>



  <div class="content">
    <!-- UPDATED: Text editing toolbar with keyboard shortcut hints -->
    <div class="text-toolbar">
      <div class="font-size-dropdown">
        <label for="font-size">Font size</label><select id="font-size-select" title="Font Size">
          <option value="12">12</option>
          <option value="14">14</option>
          <option value="16" selected>16</option>
          <option value="18">18</option>
          <option value="20">20</option>
          <option value="24">24</option>
          <option value="28">28</option>
          <option value="32">32</option>
          <option value="36">36</option>
        </select>
      </div>
      <span class="toolbar-separator">|</span>
      <button class="toolbar-btn" id="bold-btn" title="Bold (Cmd+B)">B</button>
      <button class="toolbar-btn" id="italic-btn" title="Italic (Cmd+I)">I</button>
      <button class="toolbar-btn" id="underline-btn" title="Underline (Cmd+U)">U</button>
      <span class="toolbar-separator">|</span>
      <button class="toolbar-btn" id="bullet-btn" title="Bullet List (Cmd+L)">•</button>
      <button class="toolbar-btn" id="number-btn" title="Numbered List (Cmd+D)">1.</button>
    </div>

    <div id="notes-wrapper">
      <div id="notes" contenteditable="true" spellcheck="true"></div>
    </div>
  </div>

  <!-- Controls bar -->
  <div class="controls">
    <div class="control-group">
      <span class="control-label">Opacity</span>
      <input type="range" class="opacity-slider" id="opacity-slider" min="10" max="100" value="100">
      <span id="opacity-value">100%</span>
    </div>
    <div id="save-status"></div>
  </div>

  <script src="renderer.js"></script>
</body>

</html>
